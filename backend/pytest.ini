[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --tb=short
    --strict-markers
    -p no:cacheprovider
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=90

markers =
    unit: Unit tests (services, repositories in isolation)
    integration: Integration tests (blueprints, API contracts)
    slow: Slow tests (external API calls, heavy computation)

filterwarnings =
    ignore::DeprecationWarning
