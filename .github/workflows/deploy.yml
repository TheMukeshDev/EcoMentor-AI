name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"

env:
  GOOGLE_PROJECT_ID: ecomentor-prod
  CLOUD_RUN_SERVICE: ecomentor-api
  REGION: us-central1

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --project ${{ env.GOOGLE_PROJECT_ID }} \
            --tag gcr.io/${{ env.GOOGLE_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image gcr.io/${{ env.GOOGLE_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "APP_ENV=production,GCP_PROJECT_ID=${{ env.GOOGLE_PROJECT_ID }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Generate firebase.json from env vars
        run: npm run deploy:gen-config

      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools deploy \
            --project ${{ env.GOOGLE_PROJECT_ID }} \
            --only hosting
